# Build, test & publish the hardened (DHI) BridgeLink image  —  IRT-1356
#
# This workflow only PUBLISHES the hardened image (Dockerfile.dhi), tagged `<version>-dhi` /
# `latest-dhi`. It also builds + acceptance-tests + vuln-scans the Rocky image on PRs (IRT-1391 /
# IRT-1390), but never publishes it — the Rocky image keeps being published by its existing process.
#
# Live in production (weekly schedule + manual workflow_dispatch runs have been publishing
# successfully since IRT-1356 landed). Required repo secrets/variables:
#   Secrets:
#     DOCKERHUB_USERNAME / DOCKERHUB_TOKEN   push target (innovarhealthcare/bridgelink)
#     DHI_USERNAME       / DHI_TOKEN         free Docker account, to pull the DHI base from dhi.io
#     AWS_CREDENTIALS                        contents of an ~/.aws/credentials file (only needed
#                                            when a BINARY_URL is an s3:// URL; harmless otherwise)
#     SLACK_WEBHOOK_URL   (optional)         Slack Incoming Webhook for the weekly scan summary
#                                            (notify-slack job); if unset, that job skips silently
#   Variables:
#     MAINTAINED_VERSIONS  JSON array of every DHI release line kept alive by the weekly rebuild,
#                          e.g. [{"version":"26.3.1","binary_url":"https://...","latest":false},
#                                {"version":"26.6.0","binary_url":"https://...","latest":true}]
#                          Exactly one entry should have "latest": true — that's the one that gets
#                          the rolling latest-dhi / latest-dhi-slim tags.
#     DEFAULT_VERSION      / DEFAULT_BINARY_URL   single version used only to gate PRs (dhi /
#                          test-rocky on pull_request) — pin these to the current newest release.
#
# Multi-version rebuild: the weekly schedule (and a manual dispatch left without a `version` input)
# rebuilds every entry in MAINTAINED_VERSIONS via a job matrix, so older supported lines keep
# getting the weekly DHI base-image security refresh alongside the newest release. Passing an
# explicit `version`/`binary_url` on workflow_dispatch instead does a one-off single-version publish
# (e.g. to ship a release that isn't in MAINTAINED_VERSIONS yet) without touching the others.

name: build-images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "One-off: BridgeLink version tag to publish by itself (leave blank to rebuild every version in MAINTAINED_VERSIONS instead)"
        required: false
      binary_url:
        description: "One-off: BINARY_URL for the release tarball (s3:// or https://) — required if version is set"
        required: false
      push:
        description: "Push images"
        type: boolean
        default: true
      update_latest:
        description: "One-off only: also move the rolling latest-dhi tag for this version"
        type: boolean
        default: true
  # Rebuild-on-base-update: DHI repatches frequently, so rebuild weekly to keep the near-zero-CVE
  # benefit. Rebuilds every version in the MAINTAINED_VERSIONS repo variable.
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  # PR gate: run the DHI acceptance suite (dhi job) when the image-relevant files change. The
  # publish steps within that job are skipped on pull_request (see their `if:`), so this never
  # pushes. Uses the DEFAULT_VERSION / DEFAULT_BINARY_URL repo variables (a single version — no
  # need to exercise every maintained line on every PR). Secrets are available because PRs come
  # from branches in this repo (not forks).
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.dhi"
      - "bootstrap/**"
      - "scripts/install.sh"
      - "scripts/entrypoint.sh"
      - "test/image-test.sh"
      - ".trivyignore"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read

# Cancel a superseded run for the same ref (e.g. rapid PR pushes) and avoid overlapping publishes.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve inputs vs. scheduled-run defaults once, share with downstream jobs. Produces a `matrix`
  # output (JSON array of {version, binary_url, latest}) that the dhi job fans out over:
  #   - pull_request              -> single entry from DEFAULT_VERSION/DEFAULT_BINARY_URL (PR gate)
  #   - workflow_dispatch w/version -> single ad hoc entry from the version/binary_url/update_latest inputs
  #   - schedule, or workflow_dispatch w/o version -> every entry in MAINTAINED_VERSIONS
  params:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      push: ${{ steps.p.outputs.push }}
      rocky_version: ${{ steps.p.outputs.rocky_version }}
      rocky_binary_url: ${{ steps.p.outputs.rocky_binary_url }}
    steps:
      - id: p
        env:
          # Passed via env (not spliced into the script) so JSON/URL content can't break shell
          # quoting or inject commands, regardless of what ends up in a repo variable or a manual
          # dispatch input.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_BINARY_URL: ${{ github.event.inputs.binary_url }}
          INPUT_PUSH: ${{ github.event.inputs.push }}
          INPUT_UPDATE_LATEST: ${{ github.event.inputs.update_latest }}
          DEFAULT_VERSION: ${{ vars.DEFAULT_VERSION }}
          DEFAULT_BINARY_URL: ${{ vars.DEFAULT_BINARY_URL }}
          MAINTAINED_VERSIONS_RAW: ${{ vars.MAINTAINED_VERSIONS }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            MATRIX=$(jq -nc --arg v "$DEFAULT_VERSION" --arg u "$DEFAULT_BINARY_URL" \
              '[{version:$v, binary_url:$u, latest:false}]')
            PUSH="false"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            if [ -z "$INPUT_BINARY_URL" ]; then
              echo "::error::binary_url is required when version is set on a manual dispatch." >&2
              exit 1
            fi
            LATEST_FLAG="false"
            [ "$INPUT_UPDATE_LATEST" = "true" ] && LATEST_FLAG="true"
            MATRIX=$(jq -nc --arg v "$INPUT_VERSION" --arg u "$INPUT_BINARY_URL" \
              --argjson l "$LATEST_FLAG" '[{version:$v, binary_url:$u, latest:$l}]')
            PUSH="$INPUT_PUSH"
          else
            # Scheduled weekly rebuild, or a manual dispatch with no version override: rebuild every
            # maintained version so latest-dhi stays patched *and* older supported lines keep
            # getting the weekly DHI base-image security refresh.
            if [ -z "$MAINTAINED_VERSIONS_RAW" ]; then
              echo "::error::MAINTAINED_VERSIONS repo variable is empty or unset — nothing to rebuild." >&2
              exit 1
            fi
            MATRIX=$(jq -c . <<<"$MAINTAINED_VERSIONS_RAW")
            if [ "$(jq 'length' <<<"$MATRIX")" -eq 0 ]; then
              echo "::error::MAINTAINED_VERSIONS repo variable parsed to an empty array — nothing to rebuild." >&2
              exit 1
            fi
            PUSH="$([ "$EVENT_NAME" = "schedule" ] && echo true || echo "$INPUT_PUSH")"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "push=$PUSH" >> "$GITHUB_OUTPUT"
          echo "rocky_version=${INPUT_VERSION:-$DEFAULT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "rocky_binary_url=${INPUT_BINARY_URL:-$DEFAULT_BINARY_URL}" >> "$GITHUB_OUTPUT"

  # Test + publish the hardened (DHI) image, one job run per matrix version (see params for what
  # populates the matrix). Test and publish are steps of the SAME job run so a failure in one
  # version's acceptance suite/Trivy gate only skips that version's publish steps — it does not
  # block or skip the other versions' job runs, which are wholly independent (fail-fast: false).
  # Publish steps are gated `if: github.event_name != 'pull_request'`, so a PR only exercises the
  # test/gate steps and never pushes. The Rocky image (Dockerfile) is intentionally NOT built or
  # pushed here — it keeps being published by its own existing process (test-rocky below only
  # builds a throwaway local image for PR testing).
  dhi:
    needs: params
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload the Trivy SARIF to Security > Code scanning (IRT-1390)
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.params.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3   # needed for the multi-arch publish build below
      - uses: docker/setup-buildx-action@v3
      - name: Log in to dhi.io (DHI base pull)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}
      # Authenticate Docker Hub pulls so the suite's nginx/postgres/mysql pulls don't hit the
      # anonymous pull-rate limit on shared runner IPs.
      - name: Log in to Docker Hub (authenticated pulls)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Build a local (native-arch) test image — not pushed.
      - name: Build DHI test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dhi
          load: true
          push: false
          tags: innovarhealthcare/bridgelink:dhi-test-${{ matrix.version }}
          build-args: |
            BINARY_URL=${{ matrix.binary_url }}
          # Only pass AWS creds on trusted (non-PR) events — needed for s3:// tarballs. On
          # pull_request the build uses the public-https default, so pass empty to avoid exposing
          # the secret to PR-branch code.
          secrets: |
            aws_credentials=${{ github.event_name != 'pull_request' && secrets.AWS_CREDENTIALS || '' }}
      - name: Run acceptance tests
        # DHI defaults (EXPECTED_UID=65532, CHECK_NO_SHELL=1, DOCKERFILE=Dockerfile.dhi) are implicit.
        run: IMAGE=innovarhealthcare/bridgelink:dhi-test-${{ matrix.version }} SKIP_BUILD=1 bash test/image-test.sh

      # Gate the WebAdmin-only (slim) variant too: build it with the Swing Administrator stripped and
      # run the same suite plus the strip assertion (EXPECT_NO_ADMIN_CLIENT). Proves the server still
      # boots/serves /api without client-lib/public_html.
      - name: Build DHI slim test image (INCLUDE_ADMIN_CLIENT=false)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dhi
          load: true
          push: false
          tags: innovarhealthcare/bridgelink:dhi-slim-test-${{ matrix.version }}
          build-args: |
            BINARY_URL=${{ matrix.binary_url }}
            INCLUDE_ADMIN_CLIENT=false
          secrets: |
            aws_credentials=${{ github.event_name != 'pull_request' && secrets.AWS_CREDENTIALS || '' }}
      - name: Run acceptance tests (slim)
        run: |
          IMAGE=innovarhealthcare/bridgelink:dhi-slim-test-${{ matrix.version }} SKIP_BUILD=1 \
            EXPECT_NO_ADMIN_CLIENT=1 bash test/image-test.sh

      # --- Vulnerability scan (IRT-1390) -----------------------------------------------------------
      # Full report (all severities, incl. unfixed) -> SARIF -> Security tab. Non-failing so the gate
      # below is the single source of pass/fail; uploaded even if a later step fails (if: always()).
      - name: Trivy scan (SARIF, full report) — DHI
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: innovarhealthcare/bridgelink:dhi-test-${{ matrix.version }}
          scanners: vuln
          format: sarif
          output: trivy-dhi-${{ matrix.version }}.sarif
          exit-code: "0"
        env:
          # Full report must include everything; do NOT apply .trivyignore here (it stays scoped to
          # the gate step) so allowlisted findings remain visible in the Security tab.
          TRIVY_IGNOREFILE: /dev/null
      - name: Upload Trivy SARIF — DHI
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-dhi-${{ matrix.version }}.sarif
          category: trivy-dhi-${{ matrix.version }}
      # Gate: fail the run on FIXABLE HIGH/CRITICAL in OS/base packages — the layer this repo owns.
      # Library CVEs from the bundled BridgeLink app JARs come from the Core release tarball and can't
      # be fixed here; they're surfaced in the SARIF above and tracked against Core (see README).
      # .trivyignore (repo root) is auto-applied for accepted OS findings.
      - name: Trivy gate (fixable HIGH/CRITICAL, OS packages) — DHI
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: innovarhealthcare/bridgelink:dhi-test-${{ matrix.version }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
        env:
          TRIVY_PKG_TYPES: os

      # --- Publish (multi-arch) --------------------------------------------------------------------
      # Everything below only runs on trusted (non-PR) events, and only for this matrix entry's
      # version — a Trivy-gate failure above already stopped this job run before reaching here,
      # without touching any other version's job run.
      - name: Log in to Docker Hub (push target)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Version tag always; rolling latest-dhi only when this matrix entry's `latest` flag is set
      # (exactly one entry in MAINTAINED_VERSIONS should be latest:true). The slim variant
      # (WebAdmin-only, no Swing Administrator) gets the same tags with a `-slim` suffix.
      - name: Compute tags
        if: github.event_name != 'pull_request'
        id: tags
        run: |
          T="innovarhealthcare/bridgelink:${{ matrix.version }}-dhi"
          S="innovarhealthcare/bridgelink:${{ matrix.version }}-dhi-slim"
          if [ "${{ matrix.latest }}" = "true" ]; then
            T="$T"$'\n'"innovarhealthcare/bridgelink:latest-dhi"
            S="$S"$'\n'"innovarhealthcare/bridgelink:latest-dhi-slim"
          fi
          { echo "list<<EOF"; echo "$T"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "slim<<EOF"; echo "$S"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build & push DHI image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dhi
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.params.outputs.push == 'true' }}
          build-args: |
            BINARY_URL=${{ matrix.binary_url }}
          # Mounted at /root/.aws/credentials for s3:// pulls (Dockerfile.dhi: --mount=type=secret,id=aws_credentials).
          secrets: |
            aws_credentials=${{ secrets.AWS_CREDENTIALS }}
          tags: ${{ steps.tags.outputs.list }}

      # WebAdmin-only variant: same image with the Swing Administrator stripped (INCLUDE_ADMIN_CLIENT=false).
      - name: Build & push DHI slim image (WebAdmin-only)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dhi
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.params.outputs.push == 'true' }}
          build-args: |
            BINARY_URL=${{ matrix.binary_url }}
            INCLUDE_ADMIN_CLIENT=false
          secrets: |
            aws_credentials=${{ secrets.AWS_CREDENTIALS }}
          tags: ${{ steps.tags.outputs.slim }}

  # Gate: build the Rocky image single-arch, run the same acceptance suite (UID 1000, shell present),
  # then scan it (IRT-1391). Mirrors the dhi job's test steps. Rocky PUBLISHING is unaffected — this only builds a
  # throwaway local image for PR testing; the Rocky image keeps being published by its own process.
  test-rocky:
    needs: params
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Authenticated Docker Hub pulls (the rockylinux base + the suite's nginx/postgres/mysql pulls;
      # avoids the anonymous pull-rate limit on shared runner IPs).
      - name: Log in to Docker Hub (authenticated pulls)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Rocky test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: innovarhealthcare/bridgelink:rocky-test
          build-args: |
            BINARY_URL=${{ needs.params.outputs.rocky_binary_url }}
          # Only pass AWS creds on trusted (non-PR) events — see the dhi job's test steps for the rationale.
          secrets: |
            aws_credentials=${{ github.event_name != 'pull_request' && secrets.AWS_CREDENTIALS || '' }}
      - name: Run acceptance tests
        # Rocky runs as UID 1000 and ships a shell, so the no-shell assertion is skipped for it.
        run: |
          IMAGE=innovarhealthcare/bridgelink:rocky-test SKIP_BUILD=1 \
            DOCKERFILE=Dockerfile EXPECTED_UID=1000 CHECK_NO_SHELL=0 \
            bash test/image-test.sh
      - name: Trivy scan (SARIF, full report) — Rocky
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: innovarhealthcare/bridgelink:rocky-test
          scanners: vuln
          format: sarif
          output: trivy-rocky.sarif
          exit-code: "0"
        env:
          # Full report must include everything; .trivyignore stays scoped to the gate step below.
          TRIVY_IGNOREFILE: /dev/null
      - name: Upload Trivy SARIF — Rocky
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-rocky.sarif
          category: trivy-rocky
      # Gate on OS/base packages only (see the DHI gate above for the rationale).
      - name: Trivy gate (fixable HIGH/CRITICAL, OS packages) — Rocky
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: innovarhealthcare/bridgelink:rocky-test
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
        env:
          TRIVY_PKG_TYPES: os

  # Post the image-scan summary to Slack (IRT-1390). Fires on the weekly scheduled scan and on manual
  # workflow_dispatch (for an on-demand report) — never on pull_request, so PRs stay quiet (new-PR
  # notifications are handled by the GitHub Slack app). One message: each image's gate result + total
  # finding count + links. Skips silently if SLACK_WEBHOOK_URL is unset, and never reds the run on a
  # Slack hiccup (a delivery failure is a warning, not a build failure).
  notify-slack:
    needs: [params, dhi, test-rocky]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read   # read code-scanning analyses for the finding counts
    steps:
      - name: Post scan summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DHI_RESULT: ${{ needs.dhi.result }}
          ROCKY_RESULT: ${{ needs.test-rocky.result }}
          MATRIX_JSON: ${{ needs.params.outputs.matrix }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."; exit 0
          fi
          icon() { [ "$1" = "success" ] && printf ':white_check_mark:' || printf ':x:'; }
          # latest results_count for a category on this run's ref (best-effort; 'n/a' if unavailable)
          count() {
            gh api "repos/$REPO/code-scanning/analyses?ref=$REF&per_page=100" \
              --jq "map(select(.category==\"$1\"))|.[0].results_count // \"n/a\"" 2>/dev/null || echo "n/a"
          }
          sec="$SERVER_URL/$REPO/security/code-scanning"
          run="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          # One DHI line per maintained version (each has its own trivy-dhi-<version> SARIF category).
          dhi_lines=""
          while IFS= read -r v; do
            dhi_lines="$dhi_lines"$'\n'"  - \`$v\`-dhi: $(count "trivy-dhi-$v") findings"
          done < <(echo "$MATRIX_JSON" | jq -r '.[].version')
          text="$(printf '%s\n' \
            "*BridgeLink container — image scan summary* (\`main\`)" \
            "$(icon "$DHI_RESULT") DHI gate: \`$DHI_RESULT\`$dhi_lines" \
            "$(icon "$ROCKY_RESULT") Rocky gate: \`$ROCKY_RESULT\`  ·  $(count trivy-rocky) findings" \
            "<$sec|Code scanning report>  ·  <$run|workflow run>" \
            "_Gate = fixable HIGH/CRITICAL OS packages; counts are all-severity incl. bundled libraries (IRT-1396)._")"
          payload="$(jq -n --arg t "$text" '{text:$t}')"
          code="$(curl -s -o /tmp/slack_resp -w '%{http_code}' -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL")"
          echo "Slack HTTP $code: $(cat /tmp/slack_resp)"
          [ "$code" = "200" ] || echo "::warning::Slack notification returned HTTP $code"
